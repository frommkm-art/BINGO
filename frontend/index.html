<!DOCTYPE html>

<html>

<head>

<title>Bingo Pro</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white
}

.line-complete{
background:#f97316 !important;
color:white;
animation:blink 0.6s infinite alternate;
}

.room-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.room-card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.3s;
}

.room-card:hover{
transform:scale(1.05);
background:#334155;
}

.room-title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.room-players{
margin-bottom:10px;
}

.join-btn{
background:#22c55e;
border:none;
padding:8px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

.join-btn:hover{
background:#16a34a;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
border:2px solid white;
margin:5px;
}

.avatars{
display:flex;
justify-content:center;
gap:5px;
margin-bottom:10px;
}

.bingo-container{
display:flex;
justify-content:center;
gap:10px;
font-size:40px;
font-weight:bold;
margin:20px;
}

.bingo-container span{
background:#1e293b;
padding:10px 15px;
border-radius:5px;
transition:0.3s;
}

.bingo-active{
background:#22c55e;
color:white;
transform:scale(1.2);
box-shadow:0 0 10px #22c55e;
}

@keyframes blink{
from{transform:scale(1)}
to{transform:scale(1.15)}
}

table{
margin:auto;
border-collapse:collapse
}

td{
width:60px;
height:60px;
border:2px solid white;
cursor:pointer;
transition:0.2s
}

td:hover{
background:#facc15;
color:black;
transform:scale(1.1)
}

.marked{
background:#22c55e;
font-weight:bold
}

#lobby tr{
animation:fade 0.5s
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.bingo-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
font-size:80px;
color:#facc15;
font-weight:bold;
z-index:9999;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.bingo-popup.show{
opacity:1;
pointer-events:auto;
animation:bingoZoom 1s ease;
}

@keyframes bingoZoom{
0%{transform:scale(0.3)}
60%{transform:scale(1.2)}
100%{transform:scale(1)}
}


</style>

</head>

<body>

<h1>🎮 BINGO PRO</h1>

<input id="roomCode" placeholder="Room Code">
<input id="playerName" placeholder="Player Name">

<button onclick="joinRoom()">Join</button>

<h3 id="turnStatus">Waiting...</h3>

<div id="bingoLetters" class="bingo-container">
<span id="B">B</span>
<span id="I">I</span>
<span id="N">N</span>
<span id="G">G</span>
<span id="O">O</span>
</div>

<div class="ball-machine">
<div id="ball">?</div>
</div>

<table id="board"></table>

<h2>🎮 Available Rooms</h2>

<div id="lobby" class="room-container"></div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>


<script>

const socket = io()

let board=[]
let roomCode=""
let playerNumber=0
let myTurn=false
let called=[]

function callNumber(number){

if(!roomCode) return;

fetch("/api/call-number",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
room_code:roomCode,
number:number
})
})
.then(r=>r.json())
.then(()=>{
console.log("Number called:",number)
})
.catch(err=>{
console.error(err)
})

}

window.callNumber = callNumber;

/* JOIN ROOM */

function joinRoom(){

roomCode=document.getElementById("roomCode").value
let name=document.getElementById("playerName").value

fetch("/api/join-room",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
room_code:roomCode,
player_name:name
})
})
.then(r=>r.json())
.then(data=>{

playerNumber=data.player
board=data.board

drawBoard()

socket.emit("join-room",roomCode)

if(playerNumber===1){
myTurn=true
document.getElementById("turnStatus").innerText="Your Turn"
}else{
myTurn=false
document.getElementById("turnStatus").innerText="Opponent Turn"
}

})

}

/* DRAW BOARD */

function drawBoard(){

const table=document.getElementById("board")
table.innerHTML=""

board.forEach(row=>{

let tr=document.createElement("tr")

row.forEach(n=>{

let td=document.createElement("td")

td.innerText=n
td.id="cell-"+n

td.onclick=function(){
if(!myTurn) return
callNumber(n)
}

tr.appendChild(td)

})

table.appendChild(tr)

})

}


/* RECEIVE NUMBER */

socket.on("number-called",num=>{

document.getElementById("sound").play()

called.push(num)

let cell=document.getElementById("cell-"+num)

if(cell){
cell.classList.add("marked")
}

checkBingo()

myTurn=!myTurn

document.getElementById("turnStatus").innerText=
myTurn ? "Your Turn" : "Opponent Turn"

})


/* UPDATE BINGO LETTERS */

function updateBingoLetters(lines){

const letters=["B","I","N","G","O"]

for(let i=0;i<letters.length;i++){

let el=document.getElementById(letters[i])

if(i<lines){
el.classList.add("bingo-active")
}else{
el.classList.remove("bingo-active")
}

}

}


/* CHECK BINGO */

function checkBingo(){

let lines=0

/* ROWS */
for(let i=0;i<5;i++){

let complete=true

for(let j=0;j<5;j++){
if(!called.includes(board[i][j])){
complete=false
break
}
}

if(complete){
lines++

for(let j=0;j<5;j++){
let c=document.getElementById("cell-"+board[i][j])
if(c) c.classList.add("line-complete")
}

}

}

/* COLUMNS */
for(let j=0;j<5;j++){

let complete=true

for(let i=0;i<5;i++){
if(!called.includes(board[i][j])){
complete=false
break
}
}

if(complete){
lines++

for(let i=0;i<5;i++){
let c=document.getElementById("cell-"+board[i][j])
if(c) c.classList.add("line-complete")
}

}

}

/* DIAGONAL 1 */

let complete=true

for(let i=0;i<5;i++){
if(!called.includes(board[i][i])){
complete=false
break
}
}

if(complete){
lines++

for(let i=0;i<5;i++){
let c=document.getElementById("cell-"+board[i][i])
if(c) c.classList.add("line-complete")
}

}

/* DIAGONAL 2 */

complete=true

for(let i=0;i<5;i++){
if(!called.includes(board[i][4-i])){
complete=false
break
}
}

if(complete){
lines++

for(let i=0;i<5;i++){
let c=document.getElementById("cell-"+board[i][4-i])
if(c) c.classList.add("line-complete")
}

}

updateBingoLetters(lines)

if(lines>=5){
showBingoCelebration()
}

}

/* FIREWORKS */

function launchFireworks(){

const duration = 3000;
const end = Date.now() + duration;

(function frame(){

confetti({
particleCount:6,
angle:60,
spread:60,
origin:{x:0}
});

confetti({
particleCount:6,
angle:120,
spread:60,
origin:{x:1}
});

if(Date.now() < end){
requestAnimationFrame(frame);
}

})();

}

/* BINGO CELEBRATION */

function showBingoCelebration(){

document.getElementById("winSound").play()

let popup=document.getElementById("bingoPopup")

popup.classList.add("show")

launchFireworks()

setTimeout(()=>{
popup.classList.remove("show")
},4000)

}


/* LOAD ROOMS */

function loadRooms(){

fetch("/api/rooms")
.then(r=>r.json())
.then(data=>{

const lobby=document.getElementById("lobby")
lobby.innerHTML=""

data.forEach(room=>{

let card=document.createElement("div")
card.className="room-card"

card.innerHTML=
'<div class="room-title">Room: '+room.room_code+'</div>'+
'<div class="room-players">👥 Players: '+room.players+'</div>'+
'<button class="join-btn" onclick="quickJoin(\''+room.room_code+'\')">Join</button>'

lobby.appendChild(card)

})

})

}

/* QUICK JOIN */

function quickJoin(code){
document.getElementById("roomCode").value=code
joinRoom()
}

loadRooms()
setInterval(loadRooms,3000)

</script>





<div id="bingoPopup" class="bingo-popup">
<h1>🎉 B I N G O 🎉</h1>
</div>

<audio id="winSound">
<source src="https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg">
</audio>

</body>

</html>
